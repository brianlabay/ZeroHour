<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thumbnail — Anakin vs Han</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #060810;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Orbitron', monospace;
    }

    .thumb {
      width: 800px;
      height: 420px;
      position: relative;
      overflow: hidden;
      background: #060810;
    }

    /* Scanline overlay */
    .thumb::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px
      );
    }

    /* Background glow split */
    .bg-republic {
      position: absolute;
      left: 0; top: 0;
      width: 50%; height: 100%;
      background: radial-gradient(ellipse at 30% 50%, rgba(41,182,246,0.18) 0%, transparent 70%);
    }
    .bg-rebel {
      position: absolute;
      right: 0; top: 0;
      width: 50%; height: 100%;
      background: radial-gradient(ellipse at 70% 50%, rgba(192,57,43,0.22) 0%, transparent 70%);
    }

    /* Centre divider lightning */
    .divider {
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      width: 3px;
      height: 100%;
      background: linear-gradient(180deg,
        transparent 0%,
        rgba(240,204,110,0.6) 20%,
        #f0cc6e 50%,
        rgba(240,204,110,0.6) 80%,
        transparent 100%
      );
      box-shadow: 0 0 20px rgba(240,204,110,0.5), 0 0 40px rgba(240,204,110,0.2);
      z-index: 10;
    }
    .divider-vs {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 15;
      background: #060810;
      border: 2px solid #f0cc6e;
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', monospace;
      font-size: 0.85rem;
      font-weight: 900;
      color: #f0cc6e;
      letter-spacing: 0.05em;
      box-shadow: 0 0 20px rgba(240,204,110,0.4);
    }

    /* Card panels */
    .panel {
      position: absolute;
      top: 0;
      height: 100%;
      width: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .panel-left { left: 0; }
    .panel-right { right: 0; }

    .card-img {
      height: 340px;
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 0 30px rgba(41,182,246,0.3));
      position: relative;
      z-index: 5;
      transition: transform 0.3s ease;
    }
    .panel-right .card-img {
      filter: drop-shadow(0 0 30px rgba(192,57,43,0.35));
    }

    /* Labels */
    .label {
      position: absolute;
      bottom: 20px;
      z-index: 15;
      text-align: center;
    }
    .label-left { left: 0; width: 50%; }
    .label-right { right: 0; width: 50%; }

    .label-name {
      font-family: 'Orbitron', monospace;
      font-size: 0.9rem;
      font-weight: 900;
      letter-spacing: 0.1em;
      color: #f0ede6;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(41,182,246,0.6);
    }
    .label-right .label-name {
      text-shadow: 0 0 20px rgba(192,57,43,0.6);
    }
    .label-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.3em;
      color: rgba(201,168,76,0.7);
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* Top banner */
    .top-banner {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 44px;
      background: rgba(6,8,16,0.85);
      border-bottom: 1px solid rgba(201,168,76,0.25);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 15;
    }
    .banner-logo {
      font-family: 'Orbitron', monospace;
      font-size: 0.75rem;
      font-weight: 900;
      color: #c9a84c;
      letter-spacing: 0.2em;
    }
    .banner-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.25em;
      color: rgba(240,237,230,0.5);
      text-transform: uppercase;
    }
    .banner-tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.5rem;
      letter-spacing:0.2em;
      color: #a8e063;
      border: 1px solid rgba(168,224,99,0.3);
      padding: 0.2rem 0.6rem;
    }

    /* Bottom bar */
    .bottom-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 38px;
      background: rgba(6,8,16,0.9);
      border-top: 1px solid rgba(201,168,76,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      z-index: 15;
    }
    .score-item {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      color: rgba(201,168,76,0.6);
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .score-val {
      font-family: 'Orbitron', monospace;
      font-size: 0.9rem;
      font-weight: 900;
    }
    .score-val.win { color: #a8e063; }
    .score-val.loss { color: #ff2d1a; }
    .score-divider { color: rgba(201,168,76,0.3); font-size: 0.7rem; }

    /* Faction badges */
    .faction-badge {
      position: absolute;
      top: 56px;
      z-index: 15;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.48rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 0.25rem 0.7rem;
      border: 1px solid;
    }
    .badge-republic {
      left: 16px;
      color: #29b6f6;
      border-color: rgba(41,182,246,0.4);
      background: rgba(41,182,246,0.06);
    }
    .badge-rebel {
      right: 16px;
      color: #ff2d1a;
      border-color: rgba(255,45,26,0.4);
      background: rgba(255,45,26,0.06);
    }
  </style>
</head>
